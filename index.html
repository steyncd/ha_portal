<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f1a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <title>Steyn Home</title>
    <script>
      // No-flash theme: set data-theme before first paint (reads the persisted prefs blob).
      try {
        var t = (JSON.parse(localStorage.getItem("ha_portal_prefs") || "{}").theme) || "tide";
        document.documentElement.dataset.theme = ["aurora", "tide", "meadow", "spectrum"].indexOf(t) >= 0 ? t : "tide";
      } catch (e) { document.documentElement.dataset.theme = "tide"; }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
